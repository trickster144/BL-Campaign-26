version: "3.8"

services:
  backend:
    build: ./backend
    container_name: bl-campaign-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5001
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-8080}
    depends_on: []
    networks:
      - bl-network

  frontend:
    build: ./frontend
    container_name: bl-campaign-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - bl-network

networks:
  bl-network:
    driver: bridge
