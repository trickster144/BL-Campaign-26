services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-campaign_user}
      DB_PASS: ${DB_PASS:-campaign_pass}
      DB_NAME: ${DB_NAME:-campaign_data}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-campaign_data}
      MYSQL_USER: ${DB_USER:-campaign_user}
      MYSQL_PASSWORD: ${DB_PASS:-campaign_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      # Place any .sql init scripts in ./init-db/ to auto-seed the database
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
